<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Library</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f3f4f6; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
  .card { background: white; border-radius: 10px; padding: 20px 12px 14px; text-align: center; border: 1px solid #e5e7eb; }
  .icon-wrap { display: flex; align-items: center; justify-content: center; height: 48px; margin-bottom: 10px; }
  .icon-wrap svg { width: 32px; height: 32px; color: #1a56db; }
  .label { font-size: 11px; color: #374151; word-break: break-all; line-height: 1.4; }
</style>
</head>
<body>
<h1>Icon Library</h1>
<p class="subtitle">3 icons</p>
<div class="grid">

  <div class="card">
    <div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <rect x="4" y="14" width="16" height="6" rx="2"/>
  <polyline points="7,10 12,5 17,10"/>
  <line x1="12" y1="5" x2="12" y2="14"/>
</svg></div>
    <div class="label">action-upload</div>
  </div>

  <div class="card">
    <div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <circle cx="12" cy="5" r="2"/>
  <line x1="12" y1="7" x2="12" y2="13"/>
  <line x1="7" y1="13" x2="17" y2="13"/>
  <line x1="12" y1="13" x2="12" y2="17"/>
  <line x1="7" y1="13" x2="7" y2="20"/>
  <line x1="4" y1="20" x2="20" y2="20"/>
</svg></div>
    <div class="label">science-microscope</div>
  </div>

  <div class="card">
    <div class="icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <path d="M 10,3 L 14,3 L 14,7 L 20,19 L 4,19 L 10,7 Z"/>
</svg></div>
    <div class="label">science-flask</div>
  </div>

</div>
</body>
</html>
